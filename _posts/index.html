<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELEMENTAL</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7f6;
}

header {
    background: linear-gradient(90deg, #ff4d00, #00a2ff);
    color: white;
    text-align: center;
    padding: 60px 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

section {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
}

h2 {
    border-left: 5px solid #ff4d00;
    padding-left: 10px;
}

</style>
</head>

<body>

<header>
    <h1>ELEMENTAL</h1>
    <p>세상에 없던 '반대'의 만남</p>
</header>

<div class="container">

<section>
    <h2>영화 소개</h2>
    <p>디즈니·픽사의 애니메이션 &lt;엘리멘탈&gt; 이야기</p>
</section>

<section>
    <h2>주인공</h2>
    <p>앰버 / 웨이드</p>
</section>

<section>
    <h2>줄거리</h2>
    <p>서로 다른 존재가 만나 성장하는 이야기</p>
</section>

</div>

</body>
</html>
